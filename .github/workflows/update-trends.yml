name: Daily trend update

on:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trends:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily trend data
        run: python scripts/update_trends.py

      - name: Commit updated trend data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily trend data"
          file_pattern: data/trends.json
